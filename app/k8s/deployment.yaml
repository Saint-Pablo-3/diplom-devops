apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
        - name: test-app
          image: cr.yandex/crpnq3ci2q59h2s03lt7/test-app:latest
          ports:
            - containerPort: 80
