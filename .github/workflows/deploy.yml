name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: crpnq3ci2q59h2s03lt7
  IMAGE_NAME: test-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_KEY }}

      - name: Build and Push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:latest \
            --push ./app

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate to Yandex Cloud
        run: |
          echo '${{ secrets.YC_KEY }}' > key.json
          yc config set service-account-key key.json

      - name: Get kubeconfig
        run: |
          yc managed-kubernetes cluster get-credentials cat3un5ijuksch6ihsn1 --external --force

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update deployment image
        run: |
          kubectl set image deployment/test-app \
          test-app=cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/test-app --timeout=120s
